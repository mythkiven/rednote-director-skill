<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">RedNote Director Skill social preview</title>
  <desc id="desc">A GitHub social preview banner for a Xiaohongshu and RedNote carousel generator skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090b10"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#190a0f"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="82%" cy="24%" r="58%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="75%" cy="77%" r="44%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="0.56" stop-color="#22c55e" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#redGlow)"/>
  <rect width="1280" height="640" fill="url(#greenGlow)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <g opacity="0.72">
    <path d="M 780 108 C 910 76 1028 110 1136 198" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.34"/>
    <path d="M 746 532 C 890 452 1018 462 1164 540" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.28"/>
    <circle cx="820" cy="104" r="5" fill="#ef4444"/>
    <circle cx="1012" cy="134" r="5" fill="#ef4444"/>
    <circle cx="1126" cy="196" r="5" fill="#ef4444"/>
    <circle cx="862" cy="492" r="5" fill="#22c55e"/>
    <circle cx="1040" cy="498" r="5" fill="#22c55e"/>
    <circle cx="1162" cy="540" r="5" fill="#22c55e"/>
  </g>

  <g transform="translate(72 76)">
    <rect x="0" y="0" width="176" height="34" rx="17" fill="#ef4444"/>
    <text x="18" y="23" fill="#ffffff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.6">AGENT SKILL</text>

    <text x="0" y="122" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="78" font-weight="800">RedNote</text>
    <text x="0" y="202" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="78" font-weight="800">Director Skill</text>

    <text x="2" y="266" fill="#d1d5db" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="30" font-weight="650">Xiaohongshu / RedNote carousel generator</text>
    <text x="2" y="312" fill="#9ca3af" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="25" font-weight="500">Visual direction, page layouts, AI image prompts, captions</text>

    <g transform="translate(0 378)" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="20" font-weight="700">
      <rect x="0" y="0" width="160" height="44" rx="22" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="29" fill="#f8fafc">24 styles</text>
      <rect x="178" y="0" width="234" height="44" rx="22" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="202" y="29" fill="#f8fafc">on-demand references</text>
      <rect x="430" y="0" width="192" height="44" rx="22" fill="#22c55e" fill-opacity="0.16" stroke="#22c55e" stroke-opacity="0.36"/>
      <text x="454" y="29" fill="#bbf7d0">3:4 carousel</text>
    </g>
  </g>

  <g transform="translate(790 116)" filter="url(#softShadow)">
    <rect x="0" y="0" width="350" height="438" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="28" y="30" width="294" height="52" rx="16" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="50" y="50" width="120" height="12" rx="6" fill="#f8fafc" fill-opacity="0.84"/>
    <rect x="184" y="50" width="78" height="12" rx="6" fill="#ef4444" fill-opacity="0.86"/>

    <rect x="28" y="110" width="136" height="124" rx="18" fill="#090b10" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="186" y="110" width="136" height="124" rx="18" fill="#090b10" fill-opacity="0.54" stroke="#22c55e" stroke-opacity="0.25"/>
    <path d="M58 158 L134 158 M58 184 L112 184 M58 210 L146 210" stroke="#f8fafc" stroke-opacity="0.64" stroke-width="8" stroke-linecap="round"/>
    <path d="M216 154 L292 154 M216 181 L270 181 M216 208 L304 208" stroke="#22c55e" stroke-opacity="0.72" stroke-width="8" stroke-linecap="round"/>

    <rect x="28" y="262" width="294" height="116" rx="20" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.11"/>
    <circle cx="72" cy="320" r="26" fill="#ef4444" fill-opacity="0.86"/>
    <circle cx="162" cy="320" r="26" fill="#22c55e" fill-opacity="0.78"/>
    <circle cx="252" cy="320" r="26" fill="#38bdf8" fill-opacity="0.68"/>
    <path d="M98 320 L136 320 M188 320 L226 320" stroke="#ffffff" stroke-opacity="0.36" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
